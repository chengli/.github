# auto-groom-issue.yml — reusable workflow that auto-applies dispatcher-
# required labels (phase:* + complexity:* + bug|enhancement|documentation)
# to newly opened GitHub issues in fleet repos.
#
# Why: the v3 dispatcher silently skips any issue missing one of the
# three label categories. Today multiple entry paths (gh CLI, web UI,
# /github-spec, agents) can produce non-conforming issues with no
# warning. This workflow is the safety net.
#
# Strategy: heuristic-first (deterministic, ~free) → LLM-fallback only
# when heuristic can't fill all three. Author-set labels are always
# preserved (only-ADD semantics).
#
# Security model: groom_repo / groom_ref are HARDCODED (not workflow_call
# inputs) so a hostile caller cannot point script execution at attacker-
# controlled code. aws_role_arn IS a caller input but the actual security
# boundary is the AWS IAM trust policy on that role (it locks the
# `repo:OWNER/NAME:*` claim from the OIDC token); a malicious caller
# passing an unauthorized ARN gets AccessDenied from STS.
#
# Caller pattern (per fleet repo, .github/workflows/groom.yml):
#
#   name: Auto-groom new issues
#   on:
#     issues:
#       types: [opened]
#   jobs:
#     groom:
#       uses: chengli/.github/.github/workflows/auto-groom-issue.yml@v1
#       with:
#         aws_role_arn: arn:aws:iam::740838937338:role/agent-workflow-gh-actions-groomer

name: Auto-groom new issues

on:
  workflow_call:
    inputs:
      aws_role_arn:
        type: string
        required: true
        description: ARN of IAM role to assume via OIDC for SM access. Trust policy on the role is the authoritative security boundary.
      aws_region:
        type: string
        required: false
        default: us-east-1
      sm_secret_id:
        type: string
        required: false
        default: agent-workflow-v2/claude-auth-token
      model:
        type: string
        required: false
        default: claude-sonnet-4-6

env:
  # Pinned to this repo + a stable ref so script source can never be
  # caller-supplied. Update via PR + retag if chengli/.github moves.
  GROOM_REPO: chengli/.github
  GROOM_REF: v1

jobs:
  groom:
    # Skip bot-opened issues per handoff out-of-scope rule.
    if: github.event.issue.user.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      issues: write       # to add labels on the caller repo's issue
      id-token: write     # to assume AWS role via OIDC
      contents: read      # to checkout chengli/.github (scripts source)
    steps:
      - name: Checkout groomer scripts
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GROOM_REPO }}
          ref: ${{ env.GROOM_REF }}
          path: groomer
          persist-credentials: false

      - name: Heuristic
        id: heuristic
        env:
          TITLE: ${{ github.event.issue.title }}
        run: bash groomer/scripts/heuristic.sh

      - name: Configure AWS credentials
        if: steps.heuristic.outputs.need_llm == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Fetch OAuth credentials from Secrets Manager
        if: steps.heuristic.outputs.need_llm == 'true'
        id: sm
        env:
          SM_SECRET_ID: ${{ inputs.sm_secret_id }}
        run: |
          set -euo pipefail
          # Compact the JSON to a single line so masking + handling don't
          # depend on whitespace formatting of the SM secret.
          BLOB=$(aws secretsmanager get-secret-value \
            --secret-id "$SM_SECRET_ID" \
            --query SecretString \
            --output text \
            | jq -c .)
          if [[ -z "$BLOB" || "$BLOB" == "null" ]]; then
            echo "::warning::SM blob empty — falling back without LLM" >&2
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Mask the individual sensitive fields rather than the full
          # blob: GitHub Actions ::add-mask:: matches per-line, so a
          # multi-line mask leaks any line after the first. Extracting
          # each token and masking it directly is reliable.
          ACCESS_TOKEN=$(printf '%s' "$BLOB" | jq -r '.claudeAiOauth.accessToken // empty')
          REFRESH_TOKEN=$(printf '%s' "$BLOB" | jq -r '.claudeAiOauth.refreshToken // empty')
          [[ -n "$ACCESS_TOKEN" ]] && echo "::add-mask::$ACCESS_TOKEN"
          [[ -n "$REFRESH_TOKEN" ]] && echo "::add-mask::$REFRESH_TOKEN"
          # Write to a runner-temp file rather than GITHUB_OUTPUT to
          # keep the blob out of any logs.
          CRED_FILE="$RUNNER_TEMP/claude-credentials.json"
          umask 077
          printf '%s' "$BLOB" > "$CRED_FILE"
          echo "cred_file=$CRED_FILE" >> "$GITHUB_OUTPUT"
          echo "ok=true" >> "$GITHUB_OUTPUT"

      - name: LLM classify (Sonnet 4.6)
        id: llm
        if: steps.heuristic.outputs.need_llm == 'true' && steps.sm.outputs.ok == 'true'
        env:
          TITLE: ${{ github.event.issue.title }}
          BODY: ${{ github.event.issue.body }}
          MODEL: ${{ inputs.model }}
          CREDENTIALS_FILE: ${{ steps.sm.outputs.cred_file }}
        run: bash groomer/scripts/llm-classify.sh >> "$GITHUB_OUTPUT"

      - name: Surface LLM status
        if: always() && steps.heuristic.outputs.need_llm == 'true'
        env:
          LLM_STATUS: ${{ steps.llm.outputs.llm_status }}
        run: |
          if [[ "$LLM_STATUS" == "ok" ]]; then
            echo "::notice::LLM classify succeeded"
          elif [[ "$LLM_STATUS" == "fail" ]]; then
            echo "::warning::LLM classify failed — using safe defaults (phase:think + complexity:standard + enhancement)"
          fi

      - name: Compose proposed labels
        id: compose
        env:
          H_PHASE: ${{ steps.heuristic.outputs.add_phase }}
          H_COMPLEXITY: ${{ steps.heuristic.outputs.add_complexity }}
          H_TYPE: ${{ steps.heuristic.outputs.add_type }}
          L_PHASE: ${{ steps.llm.outputs.llm_phase }}
          L_COMPLEXITY: ${{ steps.llm.outputs.llm_complexity }}
          L_TYPE: ${{ steps.llm.outputs.llm_type }}
        run: |
          set -euo pipefail
          # Heuristic wins; LLM fills gaps; hard-coded fallback last.
          # Type fallback is UNPREFIXED (`enhancement`, not `type:enhancement`)
          # because the project uses GitHub's default labels for the type
          # category.
          PHASE="${H_PHASE:-${L_PHASE:-phase:think}}"
          COMPLEXITY="${H_COMPLEXITY:-${L_COMPLEXITY:-complexity:standard}}"
          TYPE="${H_TYPE:-${L_TYPE:-enhancement}}"
          {
            echo "phase=$PHASE"
            echo "complexity=$COMPLEXITY"
            echo "type=$TYPE"
          } >> "$GITHUB_OUTPUT"
          echo "Proposed labels: $PHASE / $COMPLEXITY / $TYPE"

      - name: Apply labels (only ADD)
        env:
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
          PROPOSE_PHASE: ${{ steps.compose.outputs.phase }}
          PROPOSE_COMPLEXITY: ${{ steps.compose.outputs.complexity }}
          PROPOSE_TYPE: ${{ steps.compose.outputs.type }}
          GH_TOKEN: ${{ github.token }}
        run: bash groomer/scripts/apply-labels.sh
